{% extends 'base.html' %}

{% block title %}Menyu - Fast Food Restorani{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="text-center mb-5">
        <h1 class="mb-3">Bizning menyu</h1>
        <p class="text-muted mb-0">Ko'proq tanlov, har bir taomga mos rasm va qulay filtr.</p>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title mb-3">Kategoriya bo'yicha filtrlash:</h5>
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-outline-primary menu-filter active" data-category="all">Barchasi</button>
                        <button class="btn btn-outline-primary menu-filter" data-category="burger">Burgerlar</button>
                        <button class="btn btn-outline-primary menu-filter" data-category="pizza">Pizzalar</button>
                        <button class="btn btn-outline-primary menu-filter" data-category="lavash">Lavashlar</button>
                        <button class="btn btn-outline-primary menu-filter" data-category="drink">Ichimliklar</button>
                        <button class="btn btn-outline-primary menu-filter" data-category="dessert">Shirinliklar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row" id="menu-grid"></div>
</div>

<style>
    .menu-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        border: 1px solid #f0f0f0;
        overflow: hidden;
    }

    .menu-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
    }

    .menu-card img {
        height: 210px;
        object-fit: cover;
    }

    .menu-badge {
        font-size: 0.78rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .menu-filter.active {
        background-color: #0d6efd;
        color: #fff;
    }
</style>

    function renderMenu(category = 'all') {
        const grid = document.getElementById('menu-grid');
        const filtered = category === 'all'
            ? menuItems
            : menuItems.filter(item => item.category === category);

        grid.innerHTML = filtered.map(item => `
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                <div class="card menu-card h-100">
                    <img src="${item.image}" class="card-img-top" alt="${item.name}">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0">${item.name}</h5>
                            <span class="badge bg-light text-dark menu-badge">${item.label}</span>
                        </div>
                        <p class="card-text text-muted flex-grow-1">${item.description}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="h5 text-primary d-block mb-1">${item.price.toLocaleString()} so'm</span>
                                <small class="text-muted"><i class="fas fa-clock"></i> ${item.time} daqiqa</small>
                            </div>
                            <button class="btn btn-success btn-sm add-to-cart-btn" data-name="${item.name}">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        attachCartHandlers();
    }

    function attachCartHandlers() {
        document.querySelectorAll('.add-to-cart-btn').forEach(button => {
            button.addEventListener('click', function() {
                const title = this.dataset.name;
                this.innerHTML = '<i class="fas fa-check"></i>';
                this.classList.remove('btn-success');
                this.classList.add('btn-secondary');
                alert('"' + title + '" savatga qo\'shildi!');

                setTimeout(() => {
                    this.innerHTML = '<i class="fas fa-cart-plus"></i>';
                    this.classList.remove('btn-secondary');
                    this.classList.add('btn-success');
                }, 2000);
            });
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        renderMenu();

        document.querySelectorAll('.menu-filter').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.menu-filter').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                renderMenu(this.dataset.category);
            });
        });
    });
</script>
